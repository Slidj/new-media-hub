
<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- ANTI-CACHE META TAGS v6.3 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Media Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      console.log("HTML Head Script Start");
      // Early Telegram initialization
      if (window.Telegram && window.Telegram.WebApp) {
        console.log("Telegram WebApp found");
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
      }

      // Global error handler for early detection
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("Global Error:", message, "at", source, ":", lineno);
        var root = document.getElementById('root');
        var debug = document.getElementById('debug-test');
        if (debug) debug.innerHTML = "ERR: " + message;
        if (root && !root.innerHTML) {
          root.innerHTML = '<div style="background:#000;color:#fff;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;font-family:sans-serif;text-align:center;"><h1 style="color:#E50914;font-size:20px;">Помилка завантаження</h1><p style="color:#ccc;font-size:14px;">' + message + '</p><button onclick="location.reload()" style="background:#E50914;color:white;border:none;padding:10px 20px;border-radius:4px;margin-top:20px;">Оновити</button></div>';
        }
        return false;
      };

      // Detect browser version for old device support
      (function() {
        var ua = navigator.userAgent;
        console.log("User Agent:", ua);
        var match = ua.match(/(Chrome|Chromium|CriOS)\/([0-9]+)\./);
        var version = match ? parseInt(match[2], 10) : 999;
        
        console.log("Browser version detected:", version);
        window.browserVersion = version;
        
        if (version < 100) {
          console.warn("Running in compatibility mode for older browser (v" + version + ")");
          window.isLegacyBrowser = true;
        }
      })();

      // Ініціалізація глобального об'єкта для ключів
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      // Вставте сюди ваш робочий ключ API
      window.process.env.API_KEY = "AIzaSyA_ioxPIvGX4WI6jK_lXlrxVq8Qpf3o2xE";
      console.log("HTML Head Script End");
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      body { 
        background-color: #000000; 
        color: white; 
        margin: 0; 
        padding: 0;
        min-height: 100vh;
        width: 100%;
        overscroll-behavior-y: none;
      }

      .pt-safe {
        padding-top: env(safe-area-inset-top, 0px);
      }
      
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 20px);
      }

      /* Loading indicator styles */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(229, 9, 20, 0.3);
        border-radius: 50%;
        border-top-color: #E50914;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <h1 style="color:red; font-size:12px; position:absolute; top:0; left:0; z-index:10001;">HTML LOADED</h1>
    <!-- Visual test for very old browsers -->
    <div id="debug-test" style="position:fixed; top:15px; left:10px; color:#E50914; font-size:10px; z-index:10000; font-family:monospace;">System Booting...</div>
    <script>
      // If JS runs, change the debug text
      document.getElementById('debug-test').innerHTML = "JS OK (v" + (window.browserVersion || "?") + ")";
    </script>

    <div id="initial-loader">
      <div class="loader-spinner"></div>
      <p style="margin-top: 15px; font-family: sans-serif; font-size: 14px; color: #888;">Завантаження...</p>
    </div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>

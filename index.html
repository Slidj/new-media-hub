
<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- ANTI-CACHE META TAGS v6.3 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Media Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Global error handler to catch module loading errors
      window.onerror = function(message, source, lineno, colno, error) {
        if (message && message.toString().includes('ResizeObserver')) return true;
        
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; font-family: sans-serif; text-align: center; position: fixed; top: 0; left: 0; width: 100%; z-index: 999999;';
        errDiv.innerHTML = '<h1 style="color: #E50914; font-size: 24px; margin-bottom: 10px;">Fatal Load Error</h1><p style="color: #ccc; margin-bottom: 20px;">' + message + '</p><pre style="background: #111; padding: 10px; border-radius: 5px; font-size: 10px; text-align: left; overflow: auto; max-width: 100%; color: #888;">' + (error && error.stack ? error.stack : 'No stack trace') + '</pre><button onclick="localStorage.clear(); window.location.reload()" style="background: #E50914; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px;">Force Reset</button>';
        
        if (document.body) {
            document.body.appendChild(errDiv);
        } else {
            window.addEventListener('DOMContentLoaded', function() {
                document.body.appendChild(errDiv);
            });
        }
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.warn("Unhandled Promise Rejection:", event.reason);
      };

      // Ініціалізація глобального об'єкта для ключів
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      window.process.env.API_KEY = "AIzaSyA_ioxPIvGX4WI6jK_lXlrxVq8Qpf3o2xE";
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      body { 
        background-color: #000000; 
        color: white; 
        margin: 0; 
        padding: 0;
        min-height: 100vh;
        width: 100%;
        overscroll-behavior-y: none;
      }

      .pt-safe {
        padding-top: env(safe-area-inset-top, 0px);
      }
      
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 20px);
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  </head>

    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>


<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- ANTI-CACHE META TAGS v6.3 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Media Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Ініціалізація глобального об'єкта для ключів
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      window.process.env.API_KEY = "AIzaSyA_ioxPIvGX4WI6jK_lXlrxVq8Qpf3o2xE";
    </script>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      body { 
        background-color: #000000; 
        color: white; 
        margin: 0; 
        padding: 0;
        min-height: 100vh;
        width: 100%;
        overscroll-behavior-y: none;
      }

      .pt-safe {
        padding-top: env(safe-area-inset-top, 0px);
      }
      
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 20px);
      }

      /* Loading indicator styles */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(229, 9, 20, 0.3);
        border-radius: 50%;
        border-top-color: #E50914;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-spinner"></div>
      <p style="margin-top: 15px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #E50914; letter-spacing: 2px;">MEDIA HUB</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
